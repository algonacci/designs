<!doctype html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Braincore Sports Day — Easy Run (Story)</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />

  <!-- Styles: base + story overrides -->
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="styles_story.css" />
</head>

<body>
  <div class="canvas">

    <!-- ===================== BACKGROUND DECOR ===================== -->
    <div class="bg">
      <div class="blob blob--a"></div>
      <div class="blob blob--b"></div>
      <div class="band"></div>
      <div class="stripes"></div>
    </div>

    <!-- ===================== CONTENT FRAME ===================== -->
    <div class="frame">

      <!-- ---------- Navigation ---------- -->
      <header class="nav">
        <img class="brand__logo" src="../img/braincore/braincore-mark-white.svg" alt="Braincore.id" />
      </header>

      <!-- ---------- Hero ---------- -->
      <main class="hero">
        <div class="kicker">
          <span class="line"></span>
          Braincore Sports Day
          <span class="line"></span>
        </div>

        <h1 class="display">
          <span class="l1">Easy</span>
          <span class="l2">Run</span>
        </h1>

        <p class="tagline">Lari santai, seru-seruan bareng tim Braincore.</p>

        <!-- Run route -->
        <div class="route">
          <span class="route__pt"><span class="seed"></span>START</span>
          <span class="route__track">
            <span class="fill"></span>
            <span class="knob"></span>
          </span>
          <span class="route__pt">
            <span class="flag-check"></span>
            FINISH
          </span>
        </div>
      </main>

      <!-- ---------- Info ---------- -->
      <section class="info">
        <div class="info__item">
          <div class="info__icon">
            <!-- lucide: calendar -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M8 2v4" /><path d="M16 2v4" />
              <rect width="18" height="18" x="3" y="4" rx="2" /><path d="M3 10h18" />
            </svg>
          </div>
          <div class="info__text">
            <div class="info__val">18 Juli 2026</div>
            <div class="info__sub">Sabtu · 17.30 WIB</div>
          </div>
        </div>

        <div class="info__item">
          <div class="info__icon">
            <!-- lucide: map-pin -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0" />
              <circle cx="12" cy="10" r="3" />
            </svg>
          </div>
          <div class="info__text">
            <div class="info__val">Gelora Bung Karno</div>
            <div class="info__sub">Jakarta</div>
          </div>
        </div>

        <div class="info__item">
          <div class="info__icon">
            <!-- lucide: route -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <circle cx="6" cy="19" r="3" />
              <path d="M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15" />
              <circle cx="18" cy="5" r="3" />
            </svg>
          </div>
          <div class="info__text">
            <div class="info__val">Fun Run</div>
            <div class="info__sub">Untuk semua level</div>
          </div>
        </div>
      </section>

      <!-- ---------- CTA ---------- -->
      <div class="cta-wrap">
        <a class="cta" href="#">
          See You There!
          <!-- lucide: arrow-right -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14" /><path d="m12 5 7 7-7 7" />
          </svg>
        </a>
        <div class="cta-note">Terbuka untuk siapa saja — ajak temanmu!</div>
      </div>

      <!-- ---------- Footer ---------- -->
      <footer class="foot">
        <div class="foot__url">braincore.id</div>
        <div class="foot__tags">#BraincoreSportsDay</div>
      </footer>

    </div>
  </div>
</body>

</html>
