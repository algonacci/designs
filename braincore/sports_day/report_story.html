<!doctype html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Braincore Sports Day — Report (Story)</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />

  <!-- Styles: base + report overrides -->
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="styles_report_story.css" />
</head>

<body>
  <div class="canvas">

    <!-- ===================== BACKGROUND DECOR ===================== -->
    <div class="bg">
      <div class="blob blob--a"></div>
      <div class="blob blob--b"></div>
      <div class="band"></div>
      <div class="stripes"></div>
    </div>

    <!-- ===================== CONTENT FRAME ===================== -->
    <div class="frame">

      <!-- ---------- Navigation ---------- -->
      <header class="nav">
        <img class="brand__logo" src="../../img/braincore/braincore-mark-white.svg" alt="Braincore.id" />
      </header>

      <!-- ---------- Header ---------- -->
      <div class="report-head">
        <div class="kicker">
          <span class="line"></span>
          Braincore Sports Day
          <span class="line"></span>
        </div>
        <h1 class="display">Recap</h1>
      </div>

      <!-- ---------- Empty photo well (frameless — photos get injected here later) ---------- -->
      <div class="photo-well"></div>

      <!-- ---------- Footer ---------- -->
      <div class="report-foot">
        <div class="report-foot__thanks">Terima kasih sudah ikut serta!</div>
        <p class="report-foot__note">Sampai ketemu lagi di Braincore Sports Day berikutnya.</p>
      </div>

      <footer class="foot">
        <div class="foot__url">braincore.id</div>
        <div class="foot__tags">#BraincoreSportsDay</div>
      </footer>

    </div>
  </div>
</body>

</html>
