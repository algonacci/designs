<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Braincore — IG Course Survey Placement Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="canvas">
    <div class="ambient ambient--top"></div><div class="ambient ambient--bottom"></div>
    <div class="grid"></div><div class="orbit orbit--a"></div><div class="orbit orbit--b"></div>
    <main class="frame">
      <header class="nav">
        <img class="brand-logo" src="../../img/braincore/braincore-horizontal-white.svg" alt="Braincore.id" />
        <span class="survey-pill"><span class="pulse"></span> COMMUNITY SURVEY</span>
      </header>
      <section class="content">
        <p class="eyebrow">WE’RE LISTENING</p>
        <h1>Kalau Braincore<br />bikin <span class="accent">kelas...</span></h1>
        <p class="lead">Topik apa yang paling pengin kamu pelajari?</p>
        <div class="sticker-intro"><span>Spill topiknya</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14"/><path d="m6 13 6 6 6-6"/></svg></div>
        <div class="answer-zone answer-zone--guide" aria-label="Area untuk Instagram Question sticker"><div class="answer-zone__corners"></div><span class="answer-zone__label">AREA STICKER Q&amp;A</span></div>
        <p class="hint">Bebas — AI, data, coding, automation, karier tech, atau topik lainnya.</p>
      </section>
      <footer class="foot"><span>#LearnWithBraincore</span><span>braincore.id</span></footer>
    </main>
  </div>
</body>
</html>
