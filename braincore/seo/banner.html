<!doctype html>
<html lang="id">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Braincore — OG Banner</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
html,body{width:1200px;height:630px;overflow:hidden;font-family:'Plus Jakarta Sans',sans-serif;color:#F8FAFC;background:#070B12}
.canvas{position:relative;width:1200px;height:630px;overflow:hidden;background:linear-gradient(135deg,#070B12 0%,#0F1B3A 55%,#10254E 100%);}
.canvas::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(circle at 80% 20%,rgba(59,130,246,0.16) 0%,transparent 50%),
             radial-gradient(circle at 20% 80%,rgba(34,211,238,0.06) 0%,transparent 45%);}
.bg-grid{position:absolute;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);
  background-size:54px 54px;}
.frame{position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 80px;gap:28px;}
.logo{height:52px;width:auto;display:block;}
.headline{font-size:62px;font-weight:800;line-height:1.04;letter-spacing:-0.02em;text-align:center;max-width:780px;}
.headline .grad{background:linear-gradient(120deg,#22D3EE,#3B82F6);-webkit-background-clip:text;background-clip:text;color:transparent;}
.sub{font-size:26px;line-height:1.4;color:#94A3B8;text-align:center;max-width:640px;}
.url{font-size:20px;font-weight:600;color:#64748B;font-family:'Space Grotesk',monospace;letter-spacing:1px;}
</style></head>
<body><div class="canvas"><div class="bg-grid"></div><div class="frame">
<img class="logo" src="../../img/braincore/braincore-horizontal-white.svg" alt="Braincore">
<h1 class="headline">Jasa <span class="grad">Konsultasi &amp; Pengerjaan</span> Proyek AI</h1>
<p class="sub">Dari computer vision sampai automation — solusi AI yang benar-benar bisa dipakai bisnis Anda.</p>
<p class="url">braincore.id</p>
</div></div></body></html>
