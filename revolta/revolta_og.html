<!doctype html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Revolta OG Image</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #0a0a0f;
    }

    .og-wrap {
      width: 1200px;
      height: 630px;
    }

    .canvas {
      position: relative;
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background:
        radial-gradient(ellipse 60% 100% at 85% 50%, rgba(34, 211, 238, 0.14) 0%, transparent 60%),
        radial-gradient(ellipse 50% 80% at 5% 80%, rgba(49, 46, 129, 0.28) 0%, transparent 60%),
        linear-gradient(135deg, #0a0a0f 0%, #0f1629 55%, #0a0a0f 100%);
    }

    .grid-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(34, 211, 238, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34, 211, 238, 0.04) 1px, transparent 1px);
      background-size: 44px 44px;
      z-index: 0;
    }

    .bg-letter {
      position: absolute;
      right: -30px;
      top: -60px;
      font-family: 'Syne', sans-serif;
      font-size: 580px;
      font-weight: 800;
      color: transparent;
      -webkit-text-stroke: 1px rgba(34, 211, 238, 0.06);
      line-height: 1;
      z-index: 0;
      pointer-events: none;
      user-select: none;
    }

    .scan-line {
      position: absolute;
      top: 48%;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(34, 211, 238, 0.25) 20%, rgba(34, 211, 238, 0.25) 80%, transparent 100%);
      z-index: 1;
    }

    .inner {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 80px;
    }

    /* LEFT */
    .left {
      display: flex;
      flex-direction: column;
    }

    .badge {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
    }

    .badge-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #22d3ee;
      box-shadow: 0 0 12px rgba(34, 211, 238, 0.9);
    }

    .badge-text {
      font-size: 13px;
      font-weight: 600;
      color: #22d3ee;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .headline {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 100px;
      font-weight: 800;
      line-height: 0.88;
      letter-spacing: -4px;
      margin: 0 0 24px;
    }

    .solid { color: #ffffff; display: block; }
    .outline {
      display: block;
      color: transparent;
      -webkit-text-stroke: 2px #22d3ee;
    }

    .tagline {
      font-size: 18px;
      color: #cbd5e1;
      font-weight: 400;
      line-height: 1.5;
      max-width: 380px;
    }

    /* DIVIDER */
    .vdivider {
      width: 1px;
      height: 340px;
      background: linear-gradient(180deg, transparent, rgba(34,211,238,0.2) 30%, rgba(34,211,238,0.2) 70%, transparent);
      flex-shrink: 0;
      margin: 0 10px;
    }

    /* RIGHT */
    .right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 18px;
    }

    .services-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-end;
    }

    .svc-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .svc-label {
      font-size: 17px;
      font-weight: 600;
      color: #e2e8f0;
    }

    .svc-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #22d3ee;
      flex-shrink: 0;
    }

    .hdivider {
      width: 100%;
      height: 1px;
      background: rgba(34, 211, 238, 0.15);
    }

    .wa-box {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .wa-label {
      font-size: 11px;
      color: #6b7280;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .wa-number {
      font-size: 26px;
      font-weight: 700;
      color: #22d3ee;
      letter-spacing: -0.5px;
    }

    /* BOTTOM BAR */
    .bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 46px;
      background: rgba(255,255,255,0.03);
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 60px;
      z-index: 3;
    }

    .bottom-url {
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .bottom-slogan {
      font-size: 13px;
      color: #4b5563;
      letter-spacing: 1px;
    }
  </style>
</head>

<body>
  <div class="og-wrap">
    <div class="canvas">
      <div class="grid-bg"></div>
      <div class="bg-letter">R</div>
      <div class="scan-line"></div>

      <div class="inner">
        <!-- LEFT -->
        <div class="left">
          <div class="badge">
            <div class="badge-dot"></div>
            <span class="badge-text">Revolta.id</span>
          </div>
          <h1 class="headline">
            <span class="solid">Restore.</span>
            <span class="outline">Repair.</span>
            <span class="solid">Reliable.</span>
          </h1>
          <p class="tagline">Solusi servis laptop & elektronik<br>yang cepat, transparan, dan terpercaya.</p>
        </div>

        <!-- VERTICAL DIVIDER -->
        <div class="vdivider"></div>

        <!-- RIGHT -->
        <div class="right">
          <div class="services-list">
            <div class="svc-row"><span class="svc-label">Laptop Repair</span><div class="svc-dot"></div></div>
            <div class="svc-row"><span class="svc-label">Home Electronics</span><div class="svc-dot"></div></div>
            <div class="svc-row"><span class="svc-label">Diagnostics</span><div class="svc-dot"></div></div>
            <div class="svc-row"><span class="svc-label">Upgrade & Optimization</span><div class="svc-dot"></div></div>
            <div class="svc-row"><span class="svc-label">Data & Software</span><div class="svc-dot"></div></div>
            <div class="svc-row"><span class="svc-label">Pickup / On-site</span><div class="svc-dot"></div></div>
          </div>
          <div class="hdivider"></div>
          <div class="wa-box">
            <span class="wa-label">WhatsApp</span>
            <span class="wa-number">082125609413</span>
          </div>
        </div>
      </div>

      <!-- BOTTOM BAR -->
      <div class="bottom-bar">
        <span class="bottom-url">Revolta.id</span>
        <span class="bottom-slogan">Restore. Repair. Reliable.</span>
      </div>
    </div>
  </div>
</body>

</html>
