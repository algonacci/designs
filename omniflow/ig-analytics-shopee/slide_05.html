<!doctype html>

    <style>

      .meta {

        font:
          600 14px/1 IBM Plex Mono,

      }

        bottom: 26px;

        left: 37px;

        height: 220px;

        color: #fff;

          500 15px/1.5 IBM Plex Mono,
          monospace;
        color: #555b58;
      }
      .formula b {
        color: #643dff;
      }
      .next {
        position: absolute;
        right: 72px;
        bottom: 157px;
        font:
          600 14px/1 IBM Plex Mono,
          monospace;
        letter-spacing: 0.1em;
        color: #1f8f5f;
      }
      .foot {
        position: absolute;
        left: 72px;
        right: 72px;

        padding-top: 18px;
