<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>LMS Adaptive / 01</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,700;0,900;1,900&family=IBM+Plex+Mono:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <style>
      .c {
        background: #2d173a;
        color: #f2eee4;
      }
      .photo {
        position: absolute;
        inset: 0;
      }
      .photo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: grayscale(0.2) saturate(0.65) contrast(1.12);
      }
      .photo:after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(
            90deg,
            rgba(45, 23, 58, 0.98) 0 48%,
            rgba(45, 23, 58, 0.45)
          ),
          linear-gradient(0deg, #2d173a 0, transparent 38%);
      }
      .title {
        top: 230px;
        width: 820px;
        font-size: 104px;
      }
      .title em {
        color: #c7f34a;
      }
      .score {
        position: absolute;
        right: 70px;
        top: 445px;
        width: 310px;
        height: 310px;
        border-radius: 50%;
        border: 3px solid #f2eee4;
        display: grid;
        place-items: center;
        text-align: center;
        z-index: 4;
      }
      .score strong {
        font:
          900 132px/0.8 "DM Sans",
          sans-serif;
      }
      .score small {
        display: block;
        margin-top: 20px;
        font:
          600 12px/1 "IBM Plex Mono",
          monospace;
        letter-spacing: 0.12em;
      }
      .void {
        position: absolute;
        left: 74px;
        top: 735px;
        width: 690px;
        padding: 30px;
        border-left: 8px solid #ff6658;
        background: rgba(45, 23, 58, 0.75);
        font-size: 29px;
        line-height: 1.25;
        z-index: 5;
      }
      .scan {
        left: 735px;
      }
      .reg {
        right: 74px;
        top: 75px;
        color: #c7f34a;
      }
      .note {
        color: #d8cfe0;
      }
      .foot {
        color: #f2eee4;
      }
      .brand {
        color: #c7f34a;
      }
      .next {
        color: #c7f34a;
      }
    </style>
  </head>
  <body>
    <main class="c">
      <div class="photo">
        <img
          src="../../Bahan_Konten_Designs/online-learning-laptop.jpg"
          alt="Belajar menggunakan laptop"
        />
      </div>
      <div class="meta">
        <span>OMNIFLOW / ADAPTIVE LEARNING</span><b>QUESTION VOID / 01</b>
      </div>

        SELESAI UJIAN.<br />DAPAT NILAI.<br /><em>LALU APA?</em>
      </h1>
      <div class="score">
        <div><strong>78</strong><small>FINAL SCORE</small></div>
      </div>
      <div class="void">
        Angka menjelaskan hasil. Tapi belum menjelaskan apa yang perlu
        dipelajari berikutnya.
      </div>
      <div class="scan"></div>
      <div class="reg"></div>
      <div class="next">NEXT / BUKA LAPISANNYA →</div>
      <footer class="foot">
        <span>01 / 08</span
        ><span class="brand"
          ><svg viewBox="0 0 1000 1000">
            <polygon
              points="492.61 542.75 346.66 542.75 318.1 695.74 301.39 695.74 271.57 660.3 328.84 342.73 375.84 302.78 558 302.78 588.41 339.71 584.15 363.7 361.89 363.7 434.48 472.28 881.98 472.28 809.39 363.7 730.42 363.7 742.84 293.6 644.45 174.96 312.4 174.96 193.96 276.34 118.02 705.47 216.38 825.04 550.2 825.04 665.99 727.28 674.5 679.26 506.15 679.26 484.45 695.74 464.17 695.74 472.43 651.34 865.85 651.34 793.26 542.75"
            /></svg
          >omniflow.</span
        ><span>DATA SIMULASI</span>
      </footer>
    </main>
  </body>
</html>
