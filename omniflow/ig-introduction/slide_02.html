  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    html, body { width: 1080px; height: 1350px; overflow: hidden; font-family: 'Outfit', sans-serif; }

    .canvas {
      position: relative; width: 1080px; height: 1350px; overflow: hidden;
      background: linear-gradient(170deg, #FFFFFF 0%, #F4F7FB 48%, #EAEFF7 100%);
      padding: 80px; display: flex; flex-direction: column;
    }
    .canvas::after {
      content: ""; position: absolute; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(rgba(59,130,246,0.045) 1px, transparent 1px);
      background-size: 36px 36px;
    }
    .glow {
      position: absolute; z-index: 0; border-radius: 50%; pointer-events: none;
      width: 620px; height: 620px; bottom: -220px; right: -180px;
      background: radial-gradient(circle, rgba(59,130,246,0.10), transparent 70%);
    }

    .brand { position: relative; z-index: 2; display: flex; align-items: center; gap: 9px; }
    .brand svg { width: 30px; height: 30px; }
    .brand span { font-size: 18px; font-weight: 600; color: #3B82F6; letter-spacing: -0.01em; }

    .head { position: relative; z-index: 2; margin-top: 52px; }
    .badge {
      display: inline-flex; align-items: center; padding: 8px 18px; border-radius: 100px;
      background: #EFF6FF; border: 1.5px solid #DBEAFE; margin-bottom: 26px;
      font-size: 14px; font-weight: 600; color: #1E40AF;
      text-transform: uppercase; letter-spacing: 0.1em;
    }
    .headline {
      font-size: 56px; font-weight: 700; color: #0F172A;
      line-height: 1.09; letter-spacing: -0.022em; max-width: 880px;
    }
    .headline span { color: #3B82F6; }

    .diagram { position: relative; z-index: 2; margin-top: 50px; width: 920px; }
    .diagram svg { width: 920px; height: auto; display: block; }

    .foot { position: relative; z-index: 2; margin-top: auto; }
    .foot-line { width: 100%; height: 1.5px; background: #E2E8F0; margin-bottom: 28px; }
    .body-copy { font-size: 25px; color: #64748B; line-height: 1.5; max-width: 800px; }
    .body-copy b { color: #334155; font-weight: 600; }

    .slide-num {
      position: absolute; z-index: 3; bottom: 62px; right: 80px;
      font-size: 18px; color: #CBD5E1; font-weight: 500; letter-spacing: 0.08em;
