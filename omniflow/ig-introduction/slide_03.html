<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Omniflow Introduction — Slide 3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    html, body { width: 1080px; height: 1350px; overflow: hidden; font-family: 'Outfit', sans-serif; }

    .canvas {
      position: relative; width: 1080px; height: 1350px; overflow: hidden;
      background: linear-gradient(155deg, #1D4ED8 0%, #2563EB 42%, #172F72 100%);
      padding: 80px; display: flex; flex-direction: column;
    }
    .canvas::after {
      content: ""; position: absolute; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(rgba(255,255,255,0.09) 1px, transparent 1px);
      background-size: 38px 38px;
    }
    .orb-a {
      position: absolute; z-index: 0; border-radius: 50%; pointer-events: none;
      width: 640px; height: 640px; top: -200px; left: -180px;
      background: radial-gradient(circle, rgba(255,255,255,0.16), transparent 68%);
    }
    .orb-b {
      position: absolute; z-index: 0; border-radius: 50%; pointer-events: none;
      width: 520px; height: 520px; bottom: -180px; right: -140px;
      background: radial-gradient(circle, rgba(249,115,22,0.20), transparent 70%);
    }

    .brand {
      position: relative; z-index: 2; display: flex; align-items: center; gap: 9px;
      align-self: flex-end;
    }
    .brand svg { width: 30px; height: 30px; }
    .brand span { font-size: 18px; font-weight: 600; color: #FFFFFF; letter-spacing: -0.01em; }

    .hero { position: relative; z-index: 2; margin-top: 52px; display: flex; align-items: flex-start; gap: 34px; }
    .numeral {
      font-size: 372px; font-weight: 700; line-height: 0.82; letter-spacing: -0.05em;
      background: linear-gradient(160deg, #FFFFFF 0%, #DBEAFE 55%, #93C5FD 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .numeral-side { padding-top: 30px; }
    .numeral-side .word {
      font-size: 62px; font-weight: 700; color: #FFFFFF; line-height: 1.05; letter-spacing: -0.02em;
    }
    .numeral-side .sub {
      margin-top: 14px; font-size: 22px; font-weight: 500; color: #BFDBFE;
      text-transform: uppercase; letter-spacing: 0.14em;
    }
    .numeral-side .rule { width: 64px; height: 4px; border-radius: 4px; background: #F97316; margin-top: 22px; }

    .tag-row { position: relative; z-index: 2; margin-top: 50px; display: flex; gap: 16px; }
    .tag {
      padding: 16px 30px; border-radius: 100px;
      background: rgba(255,255,255,0.14); border: 1.5px solid rgba(255,255,255,0.28);
      font-size: 26px; font-weight: 600; color: #FFFFFF;
    }
    .tag.accent { background: rgba(249,115,22,0.22); border-color: rgba(249,115,22,0.55); color: #FED7AA; }

    .modules {
      position: relative; z-index: 2; margin-top: auto; margin-bottom: 8px;
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 17px;
    }
    .mod {
      padding: 34px 24px; border-radius: 16px;
      background: rgba(255,255,255,0.09); border: 1px solid rgba(255,255,255,0.16);
      font-size: 24px; font-weight: 500; color: #E0EAFB;
      display: flex; align-items: center; gap: 12px;
    }
    .mod i { width: 7px; height: 7px; border-radius: 50%; background: #93C5FD; display: block; flex: none; }
    .mod.more { background: rgba(249,115,22,0.16); border-color: rgba(249,115,22,0.42); color: #FED7AA; font-weight: 600; }
    .mod.more i { background: #FB923C; }

    .note {
      position: relative; z-index: 2; margin-top: 30px; max-width: 800px;
      font-size: 23px; color: #BFDBFE; line-height: 1.5;
    }

    .slide-num {
      position: absolute; z-index: 3; bottom: 62px; right: 80px;
      font-size: 18px; color: rgba(255,255,255,0.42); font-weight: 500; letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="orb-a"></div>
    <div class="orb-b"></div>

    <div class="brand">
      <svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg"><polygon fill="#FFFFFF" points="492.61 542.75 346.66 542.75 346.61 542.75 346.65 542.82 318.1 695.74 301.39 695.74 271.57 660.3 328.84 342.73 375.84 302.78 558 302.78 588.41 339.71 584.15 363.7 361.89 363.7 434.48 472.28 564.87 472.28 564.87 472.28 711.09 472.28 711.18 472.28 881.98 472.28 809.39 363.7 730.42 363.7 742.84 293.6 644.45 174.96 312.4 174.96 193.96 276.34 118.02 705.47 216.38 825.04 550.2 825.04 665.99 727.28 674.5 679.26 506.15 679.26 484.45 695.74 464.17 695.74 472.43 651.34 533.07 651.34 679.45 651.34 865.85 651.34 793.26 542.75 492.61 542.75"/></svg>
      <span>omniflow.</span>
    </div>

    <div class="hero">
      <div class="numeral">26</div>
      <div class="numeral-side">
        <div class="word">modul<br>terintegrasi</div>
        <div class="sub">Satu platform</div>
        <div class="rule"></div>
      </div>
    </div>

    <div class="tag-row">
      <span class="tag">1 database</span>
      <span class="tag">Real-time</span>
      <span class="tag accent">AI-native</span>
    </div>

    <div class="modules">
      <div class="mod"><i></i>HRIS</div>
      <div class="mod"><i></i>Accounting</div>
      <div class="mod"><i></i>Inventory</div>
      <div class="mod"><i></i>CRM</div>
      <div class="mod"><i></i>POS</div>
      <div class="mod"><i></i>Manufacturing</div>
      <div class="mod"><i></i>Purchasing</div>
      <div class="mod"><i></i>Payment</div>
      <div class="mod"><i></i>LMS</div>
      <div class="mod"><i></i>Project</div>
      <div class="mod"><i></i>Analytics</div>
      <div class="mod more"><i></i>+15 modul lain</div>
    </div>

    <div class="note">Semua modul berbagi satu data yang sama, jadi tidak perlu integrasi manual antar sistem.</div>

    <div class="slide-num">03 / 08</div>
  </div>
</body>
</html>
