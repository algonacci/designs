<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>DealDesk / 08</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Libre+Franklin:wght@700;800;900&family=Outfit:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <style>
      .c {
        background: #172a46;
        color: #f7f4ec;
      }
      .meta b {
        color: #b89545;
      }
      .title {
        font-size: 73px;
      }
      .title em {
        color: #b89545;
      }
      .decision {
        position: absolute;
        left: 72px;
        right: 72px;
        top: 430px;
        height: 560px;
        border: 3px solid #f7f4ec;
        padding: 45px;
      }
      .sequence {
        display: grid;
        grid-template-columns: 1fr 70px 1fr 70px 1fr;
        align-items: center;
      }
      .state {
        padding: 28px 22px;
        border: 2px solid #8b9098;
        height: 190px;
      }
      .state small {
        font:
          600 10px/1 "IBM Plex Mono",
          monospace;
        color: #b9c1cd;
      }
      .state strong {
        display: block;
        margin-top: 21px;
        font:
          900 28px/1 "Libre Franklin",
          sans-serif;
      }
      .state.final {
        background: #b89545;
        color: #172a46;
        border-color: #b89545;
      }
      .state.final small {
        color: #172a46;
      }
      .arr {
        text-align: center;
        font:
          900 28px/1 "Libre Franklin",
          sans-serif;
      }
      .locked {
        margin-top: 55px;
        padding: 35px;
        background: #f7f4ec;
        color: #172a46;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .locked small {
        font:
          700 11px/1 "IBM Plex Mono",
          monospace;
      }
      .locked strong {
        font:
          900 53px/1 "Libre Franklin",
          sans-serif;
      }
      .approved {
        display: inline-block;
        margin-top: 32px;
        padding: 13px 17px;
        border: 3px solid #b89545;
        color: #b89545;
        font:
          700 12px/1 "IBM Plex Mono",
          monospace;
        transform: rotate(-2deg);
      }
      .closing {
        position: absolute;
        left: 74px;
        bottom: 150px;
        font:
          900 31px/1 "Libre Franklin",
          sans-serif;
      }
      .closing span {
        color: #b89545;
      }
      .foot {
        color: #f7f4ec;
      }
      .brand {
        color: #b89545;
      }
      .next {
        color: #b89545;
      }
    </style>
  </head>
  <body>
    <main class="c">
      <div class="meta">
        <span>LOCKED TOTAL / DECISION HISTORY</span><b>SEND / 08</b>
      </div>
      <h1 class="title">
        AI MEMPERCEPAT DRAFT.<br /><em>MANUSIA MENGUNCI KEPUTUSAN.</em>
      </h1>
      <section class="decision">
        <div class="sequence">
          <article class="state">
            <small>DRAFT 01</small><strong>RP148 JT</strong>
          </article>
          <div class="arr">→</div>
          <article class="state">
            <small>REVIEW 02</small><strong>RP142 JT</strong>
          </article>
          <div class="arr">→</div>
          <article class="state final">
            <small>APPROVED 03</small><strong>RP139,5 JT</strong>
          </article>
        </div>
        <div class="locked">
          <small>GRAND TOTAL / LOCKED</small><strong>RP139.500.000</strong>
        </div>
        <div class="approved">HUMAN APPROVED / READY TO SEND</div>
      </section>
      <div class="closing">OMNIFLOW <span>DEALDESK</span></div>
      <div class="next">FINAL DOCUMENT / READY →</div>
      <footer class="foot">
        <span>08 / 08</span
        ><span class="brand"
          ><svg viewBox="0 0 1000 1000">
            <polygon
              points="492.61 542.75 346.66 542.75 318.1 695.74 301.39 695.74 271.57 660.3 328.84 342.73 375.84 302.78 558 302.78 588.41 339.71 584.15 363.7 361.89 363.7 434.48 472.28 881.98 472.28 809.39 363.7 730.42 363.7 742.84 293.6 644.45 174.96 312.4 174.96 193.96 276.34 118.02 705.47 216.38 825.04 550.2 825.04 665.99 727.28 674.5 679.26 506.15 679.26 484.45 695.74 464.17 695.74 472.43 651.34 865.85 651.34 793.26 542.75"
            /></svg
          >omniflow.</span
        ><span>PRICING DESK</span>
      </footer>
    </main>
  </body>
</html>
