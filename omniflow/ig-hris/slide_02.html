<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Omniflow HRIS — Slide 2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    html, body { width: 1080px; height: 1350px; overflow: hidden; font-family: 'Outfit', sans-serif; background: #F8FAFC; }

    .canvas {
      position: relative; width: 1080px; height: 1350px; overflow: hidden;
      background: linear-gradient(195deg, #FFFFFF 0%, #F3F6FA 40%, #EDF1F7 100%);
      display: flex; flex-direction: row-reverse;
    }
    .canvas::before {
      content: ""; position: absolute; pointer-events: none; z-index: 0;
      bottom: -100px; left: -100px; width: 380px; height: 380px; border-radius: 50%;
      background: radial-gradient(circle, rgba(249,115,22,0.04), transparent 70%);
    }
    .canvas::after {
      content: ""; position: absolute; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        radial-gradient(rgba(59,130,246,0.04) 1px, transparent 1px);
      background-size: 34px 34px;
    }

    .photo-side {
      position: relative; width: 48%; height: 100%; overflow: hidden; z-index: 1;
    }
    .photo-side img {
      width: 100%; height: 100%; object-fit: cover;
      object-position: 30% center;
      filter: saturate(0.8) brightness(1.04);
    }
    .photo-side::after {
      content: "";
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(270deg, rgba(243,246,250,0.25), transparent 50%);
    }

    .text-side {
      position: relative; width: 52%; height: 100%; padding: 80px 55px 80px 75px;
      display: flex; flex-direction: column; justify-content: center; z-index: 1;
    }

    .icon-top { width: 36px; height: 36px; margin-bottom: 42px; color: #F97316; }

    .headline {
      font-size: 60px; font-weight: 700; color: #0F172A;
      line-height: 1.08; letter-spacing: -0.02em;
    }
    .headline span { color: #3B82F6; }

    .body-copy {
      margin-top: 30px; font-size: 25px; color: #64748B;
      line-height: 1.48; font-weight: 400;
    }

    .brand-corner {
      position: absolute; top: 48px; left: 75px; z-index: 2;
      display: flex; align-items: center; gap: 8px;
    }
    .brand-corner svg { width: 28px; height: 28px; }
    .brand-corner span {
      font-size: 17px; font-weight: 600; color: #3B82F6;
      letter-spacing: -0.01em;
    }

    .slide-num {
      position: absolute; bottom: 56px; left: 75px; z-index: 2;
      font-size: 18px; color: #CBD5E1; font-weight: 500; letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="photo-side"><img src="img/payroll-documents-desk.jpg" alt="Payroll documents and calculator on desk"></div>
    <div class="text-side">
      <div class="icon-top">
        <svg viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="12" stroke="#F97316" stroke-width="2"/><line x1="16" y1="8" x2="16" y2="17" stroke="#F97316" stroke-width="2" stroke-linecap="round"/><line x1="16" y1="21" x2="16.01" y2="21" stroke="#F97316" stroke-width="2.5" stroke-linecap="round"/></svg>
      </div>
      <h1 class="headline">Satu kesalahan input gaji bisa bikin <span>trust runtuh.</span></h1>
      <p class="body-copy">Keterlambatan payroll, perhitungan lembur meleset, atau data cuti tidak sinkron. Ini bukan cuma error teknis, ini soal kepercayaan karyawan.</p>
    </div>
    <div class="brand-corner">
      <svg viewBox="0 0 1000 1000" fill="none" xmlns="http://www.w3.org/2000/svg"><polygon fill="#3B82F6" points="492.61 542.75 346.66 542.75 346.61 542.75 346.65 542.82 318.1 695.74 301.39 695.74 271.57 660.3 328.84 342.73 375.84 302.78 558 302.78 588.41 339.71 584.15 363.7 361.89 363.7 434.48 472.28 564.87 472.28 564.87 472.28 711.09 472.28 711.18 472.28 881.98 472.28 809.39 363.7 730.42 363.7 742.84 293.6 644.45 174.96 312.4 174.96 193.96 276.34 118.02 705.47 216.38 825.04 550.2 825.04 665.99 727.28 674.5 679.26 506.15 679.26 484.45 695.74 464.17 695.74 472.43 651.34 533.07 651.34 679.45 651.34 865.85 651.34 793.26 542.75 492.61 542.75"/></svg>
      <span>omniflow.</span>
    </div>
    <div class="slide-num">2 / 8</div>
  </div>
</body>
</html>
