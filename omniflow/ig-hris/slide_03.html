<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Omniflow HRIS — Slide 3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    html, body { width: 1080px; height: 1350px; overflow: hidden; font-family: 'Outfit', sans-serif; background: #F8FAFC; }

    .canvas {
      position: relative; width: 1080px; height: 1350px; overflow: hidden;
      background: linear-gradient(180deg, #FFFFFF 0%, #F4F7FB 30%, #F0F4F9 70%, #FFFFFF 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 0 100px;
    }
    .canvas::before {
      content: ""; position: absolute; pointer-events: none; z-index: 0;
      top: -60px; right: 60px; width: 300px; height: 300px; border-radius: 50%;
      background: radial-gradient(circle, rgba(59,130,246,0.05), transparent 70%);
    }
    .canvas::after {
      content: ""; position: absolute; pointer-events: none; z-index: 0;
      bottom: -80px; left: -40px; width: 350px; height: 350px; border-radius: 50%;
      background: radial-gradient(circle, rgba(99,102,241,0.04), transparent 70%);
    }

    .bg-grid {
      position: absolute; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
      background-size: 64px 64px;
    }

    .icon-row {
      display: flex; gap: 56px; margin-top: 64px; z-index: 1;
      justify-content: center; width: 100%;
    }
    .icon-card {
      display: flex; flex-direction: column; align-items: center; gap: 20px;
      width: 220px;
    }
    .icon-circle {
      width: 100px; height: 100px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: #FFFFFF; border: 2px solid #DBEAFE;
      box-shadow: 0 6px 20px rgba(59,130,246,0.07);
    }
    .icon-circle svg { width: 40px; height: 40px; }
    .icon-label { font-size: 24px; color: #1E40AF; font-weight: 600; text-align: center; }

    .headline {
      font-size: 62px; font-weight: 700; color: #0F172A;
      line-height: 1.1; letter-spacing: -0.02em; text-align: center;
      max-width: 800px; z-index: 1;
    }
    .headline span { color: #3B82F6; }

    .body-copy {
      margin-top: 28px; font-size: 25px; color: #64748B;
      line-height: 1.5; font-weight: 400; text-align: center; max-width: 660px; z-index: 1;
    }

    .brand-corner {
      position: absolute; bottom: 56px; left: 50%; transform: translateX(-50%); z-index: 2;
      display: flex; align-items: center; gap: 8px;
    }
    .brand-corner svg { width: 28px; height: 28px; }
    .brand-corner span {
      font-size: 17px; font-weight: 600; color: #3B82F6;
      letter-spacing: -0.01em;
    }

    .slide-num {
      position: absolute; bottom: 56px; right: 75px; z-index: 2;
      font-size: 18px; color: #CBD5E1; font-weight: 500; letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="bg-grid"></div>
    <h1 class="headline">HRIS bukan tools mahal. Itu <span>investasi</span> yang balik modal dalam 3 bulan.</h1>
    <p class="body-copy">Satu sistem yang menggabungkan payroll, absensi, cuti, dan data karyawan, menghilangkan input ganda dan error manusiawi.</p>
    <div class="icon-row">
      <div class="icon-card">
        <div class="icon-circle">
          <svg viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="12" stroke="#3B82F6" stroke-width="2"/><line x1="16" y1="8" x2="16" y2="16" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/><circle cx="16" cy="16" r="3" fill="#3B82F6"/></svg>
        </div>
        <span class="icon-label">Payroll</span>
      </div>
      <div class="icon-card">
        <div class="icon-circle">

        </div>
        <span class="icon-label">Absensi</span>

        <div class="icon-circle">

        <span class="icon-label">Data Karyawan</span>
      </div>
    </div>
    <div class="brand-corner">
      <svg viewBox="0 0 1000 1000" fill="none" xmlns="http://www.w3.org/2000/svg"><polygon fill="#3B82F6" points="492.61 542.75 346.66 542.75 346.61 542.75 346.65 542.82 318.1 695.74 301.39 695.74 271.57 660.3 328.84 342.73 375.84 302.78 558 302.78 588.41 339.71 584.15 363.7 361.89 363.7 434.48 472.28 564.87 472.28 564.87 472.28 711.09 472.28 711.18 472.28 881.98 472.28 809.39 363.7 730.42 363.7 742.84 293.6 644.45 174.96 312.4 174.96 193.96 276.34 118.02 705.47 216.38 825.04 550.2 825.04 665.99 727.28 674.5 679.26 506.15 679.26 484.45 695.74 464.17 695.74 472.43 651.34 533.07 651.34 679.45 651.34 865.85 651.34 793.26 542.75 492.61 542.75"/></svg>
      <span>omniflow.</span>
    </div>
    <div class="slide-num">3 / 8</div>
  </div>
</body>
</html>
