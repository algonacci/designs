<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Omniflow HRIS — Slide 1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    html, body { width: 1080px; height: 1350px; overflow: hidden; font-family: 'Outfit', sans-serif; background: #F8FAFC; }

    .canvas {
      position: relative; width: 1080px; height: 1350px; overflow: hidden;
      background: linear-gradient(165deg, #FFFFFF 0%, #F5F8FC 45%, #EEF2F8 100%);
      display: flex;
    }
    .canvas::before {
      content: ""; position: absolute; pointer-events: none; z-index: 0;
      top: -120px; right: -80px; width: 420px; height: 420px; border-radius: 50%;
      background: radial-gradient(circle, rgba(59,130,246,0.06), transparent 70%);
    }
    .canvas::after {
      content: ""; position: absolute; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        radial-gradient(rgba(59,130,246,0.04) 1px, transparent 1px);
      background-size: 36px 36px;
    }

    .photo-side {
      position: relative; width: 52%; height: 100%; overflow: hidden; z-index: 1;
    }
    .photo-side img {
      width: 100%; height: 100%; object-fit: cover;
      object-position: 40% center;
      filter: saturate(0.85) brightness(1.02);
    }
    .photo-side::after {
      content: "";
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(90deg, rgba(255,255,255,0.12), transparent 55%);
    }

    .text-side {
      position: relative; width: 47%; height: 100%; padding: 80px 70px 80px 55px;
      display: flex; flex-direction: column; justify-content: center; z-index: 1;
    }

    .brand-row {
      display: flex; align-items: center; gap: 12px; margin-bottom: 52px;
    }
    .brand-mark { width: 42px; height: 42px; }
    .brand-name {
      font-size: 20px; font-weight: 700; color: #3B82F6;
      letter-spacing: -0.01em; text-transform: lowercase;
    }

    .headline {
      font-size: 64px; font-weight: 700; color: #0F172A;
      line-height: 1.08; letter-spacing: -0.02em;
    }
    .headline span { color: #3B82F6; }

    .body-copy {
      margin-top: 32px; font-size: 26px; color: #64748B;
      line-height: 1.48; font-weight: 400;
    }

    .watermark {
      position: absolute; bottom: 56px; left: 30px; z-index: 2;
      display: flex; align-items: center; gap: 8px;
    }
    .watermark svg { width: 28px; height: 28px; }
    .watermark span {
      font-size: 17px; font-weight: 600; color: #3B82F6;
      letter-spacing: -0.01em;
    }

    .slide-num {
      position: absolute; bottom: 56px; right: 75px; z-index: 2;
      font-size: 18px; color: #CBD5E1; font-weight: 500; letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="photo-side"><img src="img/hr-office-worker.jpg" alt="HR professional at work"></div>
    <div class="text-side">
      <div class="brand-row">
        <div class="brand-mark">
          <svg viewBox="0 0 1000 1000" fill="none" xmlns="http://www.w3.org/2000/svg"><polygon fill="#3B82F6" points="492.61 542.75 346.66 542.75 346.61 542.75 346.65 542.82 318.1 695.74 301.39 695.74 271.57 660.3 328.84 342.73 375.84 302.78 558 302.78 588.41 339.71 584.15 363.7 361.89 363.7 434.48 472.28 564.87 472.28 564.87 472.28 711.09 472.28 711.18 472.28 881.98 472.28 809.39 363.7 730.42 363.7 742.84 293.6 644.45 174.96 312.4 174.96 193.96 276.34 118.02 705.47 216.38 825.04 550.2 825.04 665.99 727.28 674.5 679.26 506.15 679.26 484.45 695.74 464.17 695.74 472.43 651.34 533.07 651.34 679.45 651.34 865.85 651.34 793.26 542.75 492.61 542.75"/></svg>
        </div>
        <span class="brand-name">omniflow.</span>
      </div>
      <h1 class="headline">HR Anda habiskan <span>40% waktunya</span> di Excel?</h1>
      <p class="body-copy">Setiap jam yang dihabiskan untuk input manual adalah jam yang tidak dipakai untuk mengembangkan tim Anda.</p>
    </div>
    <div class="slide-num">1 / 8</div>
  </div>
</body>
</html>
