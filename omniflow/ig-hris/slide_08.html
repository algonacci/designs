<!doctype html>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    html, body { width: 1080px; height: 1350px; overflow: hidden; font-family: 'Outfit', sans-serif; background: #2563EB; }

    .canvas {
      position: relative; width: 1080px; height: 1350px; overflow: hidden;
      background: linear-gradient(155deg, #3B82F6 0%, #2563EB 55%, #1D4ED8 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 0 100px;
    }

    .orb {
      position: absolute; border-radius: 50%; pointer-events: none;
    }
    .orb.orb-1 {
      top: -200px; right: -100px; width: 520px; height: 520px;
      background: radial-gradient(circle, rgba(255,255,255,0.07), transparent 70%);
    }
    .orb.orb-2 {
      bottom: -220px; left: -120px; width: 560px; height: 560px;
      background: radial-gradient(circle, rgba(99,102,241,0.2), transparent 70%);
    }
    .orb.orb-3 {
      top: 45%; left: 50%; transform: translate(-50%, -50%);
      width: 750px; height: 750px;
      background: radial-gradient(circle, rgba(255,255,255,0.025), transparent 60%);
    }

    .grid-overlay {
      position: absolute; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .logo-white {
      width: 60px; height: 60px; margin-bottom: 44px; z-index: 1;
    }

    .headline {
      font-size: 58px; font-weight: 700; color: #FFFFFF;
      line-height: 1.1; letter-spacing: -0.02em; text-align: center;
      max-width: 740px; z-index: 1;
    }

    .body-copy {
      margin-top: 28px; font-size: 25px; color: #DBEAFE;
      line-height: 1.5; text-align: center; max-width: 600px; z-index: 1;
    }

    .cta-button {
      margin-top: 52px; z-index: 1;
      display: inline-flex; align-items: center; gap: 12px;
      padding: 22px 52px; border-radius: 999px;
      background: #F97316; color: #FFFFFF;
      font-size: 25px; font-weight: 600; letter-spacing: -0.01em;
      box-shadow: 0 8px 32px rgba(249,115,22,0.35);
    }
    .cta-button svg { width: 22px; height: 22px; }

    .url-text {
      margin-top: 30px; font-size: 21px; color: #93C5FD; font-weight: 400;
      letter-spacing: 0.02em; z-index: 1;
    }

    .slide-num {

      letter-spacing: 0.06em; z-index: 1;
