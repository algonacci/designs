<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Omniflow E-commerce — Slide 6</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    html, body { width: 1080px; height: 1350px; overflow: hidden; font-family: 'Outfit', sans-serif; background: #0B1220; }

    .canvas {
      position: relative; width: 1080px; height: 1350px; overflow: hidden;
      background: #0B1220;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 100px 80px 112px;
    }

    .grid-overlay {
      position: absolute; inset: 0; pointer-events: none; z-index: 0;
      background-image: radial-gradient(rgba(147,197,253,0.07) 1px, transparent 1px);
      background-size: 38px 38px;
    }

    .orb {
      position: absolute; border-radius: 50%; pointer-events: none; z-index: 0;
    }
    .orb.orb-1 {
      top: -180px; left: -100px; width: 540px; height: 540px;
      background: radial-gradient(circle, rgba(139,92,246,0.24), transparent 68%);
    }
    .orb.orb-2 {
      bottom: -180px; right: -100px; width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(249,115,22,0.20), transparent 70%);
    }

    .quote-mark {
      position: relative; z-index: 1;
      font-size: 200px; font-weight: 700; line-height: 0.6;
      color: rgba(255,255,255,0.15);
      font-family: Georgia, serif;
      margin-bottom: -30px;
    }

    .quote {
      position: relative; z-index: 1;
      font-size: 50px; font-weight: 600; color: #FFFFFF;
      line-height: 1.18; letter-spacing: -0.02em; text-align: center;
      max-width: 880px;
    }
    .quote .accent {
      background: linear-gradient(120deg, #FB923C 0%, #F97316 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }

    .attribution {
      position: relative; z-index: 1;
      margin-top: 56px;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
    }
    .attr-line {
      width: 48px; height: 2px; background: rgba(255,255,255,0.3);
    }
    .attr-name {
      font-size: 20px; font-weight: 600; color: #FFFFFF;
      letter-spacing: -0.01em;
    }
    .attr-role {
      font-size: 16px; color: #94A3B8; font-weight: 500;
    }

    .brand {
      position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); z-index: 2;
      display: flex; align-items: center; gap: 10px;
    }
    .brand svg { width: 30px; height: 30px; }
    .brand span {
      font-size: 18px; font-weight: 600; color: #FFFFFF;
      letter-spacing: -0.01em;
    }

    .slide-num {
      position: absolute; top: 50px; right: 80px; z-index: 2;
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      font-size: 18px; color: rgba(255,255,255,0.38); font-weight: 500;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="grid-overlay"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-orb-2" style="position:absolute;border-radius:50%;pointer-events:none;z-index:0;bottom:-180px;right:-100px;width:500px;height:500px;background:radial-gradient(circle,rgba(249,115,22,0.20),transparent 70%);"></div>
    <div class="slide-num">06 / 08</div>
    <div class="quote-mark">&ldquo;</div>
    <p class="quote">Pelanggan kami tumbuh <span class="accent">3x lipat</span>, tim operasional tidak.</p>
    <div class="attribution">
      <div class="attr-line"></div>
      <div class="attr-name">Rina Kusuma</div>
      <div class="attr-role">COO, DistroMerk (representatif)</div>
    </div>
    <div class="brand">
      <svg viewBox="0 0 1000 1000" fill="none" xmlns="http://www.w3.org/2000/svg"><polygon fill="#FFFFFF" points="492.61 542.75 346.66 542.75 346.61 542.75 346.65 542.82 318.1 695.74 301.39 695.74 271.57 660.3 328.84 342.73 375.84 302.78 558 302.78 588.41 339.71 584.15 363.7 361.89 363.7 434.48 472.28 564.87 472.28 564.87 472.28 711.09 472.28 711.18 472.28 881.98 472.28 809.39 363.7 730.42 363.7 742.84 293.6 644.45 174.96 312.4 174.96 193.96 276.34 118.02 705.47 216.38 825.04 550.2 825.04 665.99 727.28 674.5 679.26 506.15 679.26 484.45 695.74 464.17 695.74 472.43 651.34 533.07 651.34 679.45 651.34 865.85 651.34 793.26 542.75 492.61 542.75"/></svg>
      <span>omniflow.</span>
    </div>
  </div>
</body>
</html>
