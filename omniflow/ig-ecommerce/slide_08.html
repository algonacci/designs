<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Omniflow E-commerce — Slide 8</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    html, body { width: 1080px; height: 1350px; overflow: hidden; font-family: 'Outfit', sans-serif; background: #0B1220; }

    .canvas { position: relative; width: 1080px; height: 1350px; overflow: hidden; }

    .photo {
      position: absolute; inset: 0; z-index: 0;
    }
    .photo img {
      width: 100%; height: 100%; object-fit: cover;
      filter: saturate(0.7) brightness(0.78) contrast(1.05);
    }

    .veil {
      position: absolute; inset: 0; z-index: 1; pointer-events: none;
      background: linear-gradient(180deg,
        rgba(11,18,32,0.78) 0%, rgba(11,18,32,0.45) 30%,
        rgba(11,18,32,0.55) 55%, rgba(11,18,32,0.95) 100%);
    }

    .grid-overlay {
      position: absolute; inset: 0; pointer-events: none; z-index: 2;
      background-image: radial-gradient(rgba(147,197,253,0.07) 1px, transparent 1px);
      background-size: 38px 38px;
    }

    .orb {
      position: absolute; border-radius: 50%; pointer-events: none; z-index: 2;
    }
    .orb.orb-1 {
      top: -180px; right: -120px; width: 540px; height: 540px;
      background: radial-gradient(circle, rgba(249,115,22,0.24), transparent 70%);
    }
    .orb.orb-2 {
      bottom: 80px; left: -160px; width: 460px; height: 460px;
      background: radial-gradient(circle, rgba(59,130,246,0.20), transparent 70%);
    }

    .content {
      position: absolute; inset: 0; z-index: 3;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 0 100px;
    }

    .logo-mark {
      width: 76px; height: 76px; margin-bottom: 36px;
    }

    .headline {
      font-size: 58px; font-weight: 700; color: #FFFFFF;
      line-height: 1.1; letter-spacing: -0.022em; text-align: center;
      max-width: 820px;
    }
    .headline span {
      background: linear-gradient(120deg, #FB923C 0%, #F97316 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }

    .body-copy {
      margin-top: 22px; font-size: 22px; color: #DBEAFE;
      line-height: 1.5; text-align: center; max-width: 660px;
    }

    .cta-row {
      display: flex; gap: 16px; margin-top: 48px;
    }
    .cta-button {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 20px 36px; border-radius: 999px;
      font-size: 22px; font-weight: 600; letter-spacing: -0.01em;
    }
    .cta-button.primary {
      background: #F97316; color: #FFFFFF;
      box-shadow: 0 8px 32px rgba(249,115,22,0.45);
    }
    .cta-button.secondary {
      background: rgba(255,255,255,0.10);
      backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255,255,255,0.28);
      color: #FFFFFF;
    }
    .cta-button svg { width: 20px; height: 20px; }

    .url-row {
      display: flex; gap: 32px; margin-top: 36px;
      font-size: 17px; color: #93C5FD; font-weight: 500;
      letter-spacing: 0.02em;
    }

    .brand {
      position: absolute; top: 50px; left: 80px; z-index: 4;
      display: flex; align-items: center; gap: 10px;
    }
    .brand svg { width: 30px; height: 30px; }
    .brand span {
      font-size: 18px; font-weight: 600; color: #FFFFFF;
      letter-spacing: -0.01em;
    }

    .slide-num {
      position: absolute; top: 50px; right: 80px; z-index: 4;
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      font-size: 18px; color: rgba(255,255,255,0.38); font-weight: 500;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="photo"><img src="img/online-store-owner.jpg" alt="Online store owner Indonesia"></div>
    <div class="veil"></div>
    <div class="grid-overlay"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="brand">

      <span>omniflow.</span>
    </div>
    <div class="slide-num">08 / 08</div>
    <div class="content">
      <div class="logo-mark">
        <svg viewBox="0 0 1000 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon fill="#FFFFFF" points="492.61 542.75 346.66 542.75 346.61 542.75 346.65 542.82 318.1 695.74 301.39 695.74 271.57 660.3 328.84 342.73 375.84 302.78 558 302.78 588.41 339.71 584.15 363.7 361.89 363.7 434.48 472.28 564.87 472.28 564.87 472.28 711.09 472.28 711.18 472.28 881.98 472.28 809.39 363.7 730.42 363.7 742.84 293.6 644.45 174.96 312.4 174.96 193.96 276.34 118.02 705.47 216.38 825.04 550.2 825.04 665.99 727.28 674.5 679.26 506.15 679.26 484.45 695.74 464.17 695.74 472.43 651.34 533.07 651.34 679.45 651.34 865.85 651.34 793.26 542.75 492.61 542.75"/>
        </svg>
      </div>
      <h1 class="headline">Lihat <span>Omniflow Commerce</span> beraksi</h1>
      <p class="body-copy">Eksplor modul E-Commerce, atau langsung jadwalkan demo gratis dengan tim kami.</p>
      <div class="cta-row">
        <a class="cta-button secondary" href="https://omniflow.id/id/modules/ecommerce">
          Lihat Modul

      </div>
      <div class="url-row">
        <span>omniflow.id/ecommerce</span>

    </div>
  </div>
