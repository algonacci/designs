<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Omniflow E-commerce — Slide 1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    html, body { width: 1080px; height: 1350px; overflow: hidden; font-family: 'Outfit', sans-serif; background: #0B1220; }

    .canvas {
      position: relative; width: 1080px; height: 1350px; overflow: hidden;
      background: #0B1220;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 80px 80px 112px;
    }

    .grid-overlay {
      position: absolute; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(147,197,253,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(147,197,253,0.06) 1px, transparent 1px);
      background-size: 80px 80px;
    }

    .orb {
      position: absolute; border-radius: 50%; pointer-events: none; z-index: 0;
    }
    .orb.orb-1 {
      top: -180px; right: -120px; width: 540px; height: 540px;
      background: radial-gradient(circle, rgba(139,92,246,0.28), transparent 68%);
    }
    .orb.orb-2 {
      bottom: -160px; left: -100px; width: 460px; height: 460px;
      background: radial-gradient(circle, rgba(59,130,246,0.20), transparent 70%);
    }

    .headline {
      position: relative; z-index: 1;
      font-size: 60px; font-weight: 700; color: #FFFFFF;
      line-height: 1.08; letter-spacing: -0.022em; text-align: center;
      max-width: 880px;
    }
    .headline span {
      background: linear-gradient(120deg, #FB923C 0%, #F97316 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }

    .body-copy {
      position: relative; z-index: 1;
      margin-top: 22px; font-size: 23px; color: #94A3B8;
      line-height: 1.45; text-align: center; max-width: 720px;
    }

    .qa-stack {
      position: relative; z-index: 1;
      margin-top: 50px; width: 100%; max-width: 780px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .qa {
      display: flex; align-items: center; gap: 16px;
      padding: 16px 22px; border-radius: 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
    }
    .qa-q {
      flex: 1; font-size: 18px; color: #CBD5E1; font-weight: 500;
    }
    .qa-arrow {
      width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
    }
    .qa-a {
      font-size: 19px; color: #FFFFFF; font-weight: 600;
      padding: 6px 14px; border-radius: 100px;
      background: rgba(249,115,22,0.18);
      border: 1px solid rgba(249,115,22,0.4);
    }

    .brand {
      position: absolute; top: 50px; left: 80px; z-index: 2;
      display: flex; align-items: center; gap: 10px;
    }
    .brand svg { width: 30px; height: 30px; }
    .brand span {
      font-size: 18px; font-weight: 600; color: #FFFFFF;
      letter-spacing: -0.01em;
    }

    .slide-num {
      position: absolute; top: 50px; right: 80px; z-index: 2;
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      font-size: 18px; color: rgba(255,255,255,0.38); font-weight: 500;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="grid-overlay"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="brand">
      <svg viewBox="0 0 1000 1000" fill="none" xmlns="http://www.w3.org/2000/svg"><polygon fill="#FFFFFF" points="492.61 542.75 346.66 542.75 346.61 542.75 346.65 542.82 318.1 695.74 301.39 695.74 271.57 660.3 328.84 342.73 375.84 302.78 558 302.78 588.41 339.71 584.15 363.7 361.89 363.7 434.48 472.28 564.87 472.28 564.87 472.28 711.09 472.28 711.18 472.28 881.98 472.28 809.39 363.7 730.42 363.7 742.84 293.6 644.45 174.96 312.4 174.96 193.96 276.34 118.02 705.47 216.38 825.04 550.2 825.04 665.99 727.28 674.5 679.26 506.15 679.26 484.45 695.74 464.17 695.74 472.43 651.34 533.07 651.34 679.45 651.34 865.85 651.34 793.26 542.75 492.61 542.75"/></svg>
      <span>omniflow.</span>
    </div>
    <div class="slide-num">01 / 08</div>
    <h1 class="headline">Berapa tab Excel yang Anda buka buat <span>olah satu order</span>?</h1>
    <p class="body-copy">Stok update di sheet. Invoice di aplikasi lain. Resi di chat. Lalu dicatat ulang. Tiga kali input, satu order.</p>
    <div class="qa-stack">
      <div class="qa">
        <div class="qa-q">Stok berubah di mana?</div>
        <div class="qa-arrow"><svg viewBox="0 0 32 32" fill="none"><path d="M6 16h20M18 8l8 8-8 8" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="qa-a">3 tempat</div>
      </div>
      <div class="qa">
        <div class="qa-q">Siapa yang input ulang?</div>
        <div class="qa-arrow"><svg viewBox="0 0 32 32" fill="none"><path d="M6 16h20M18 8l8 8-8 8" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="qa-a">4 orang</div>
      </div>
      <div class="qa">
        <div class="qa-q">Berapa lama satu order?</div>
        <div class="qa-arrow"><svg viewBox="0 0 32 32" fill="none"><path d="M6 16h20M18 8l8 8-8 8" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="qa-a">1.5 jam</div>
      </div>
    </div>
  </div>
</body>
</html>
