<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Vecta AI / 04</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      .title {
        font-family: "Barlow Condensed", sans-serif !important;
        font-size: 96px !important;
        line-height: 0.9 !important;
        letter-spacing: -0.018em !important;
      }
      .field strong {
        font-family: "Barlow Condensed", sans-serif !important;
        font-size: 39px !important;
        letter-spacing: 0 !important;
      }
      .selection,
      .pulse {
        display: none !important;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 1080px;
        height: 1350px;
        overflow: hidden;
        background: #f4f1e9;
      }
      .c {
        position: relative;
        width: 1080px;
        height: 1350px;
        overflow: hidden;
        background: #f4f1e9;
        color: #101416;
        font-family: Outfit, sans-serif;
      }
      .meta {
        position: absolute;
        top: 68px;
        left: 73px;
        right: 73px;
        display: flex;
        justify-content: space-between;
        font:
          600 14px/1 IBM Plex Mono,
          monospace;
        letter-spacing: 0.12em;
      }
      .meta b {
        color: #e64ba8;
      }
      .title {
        position: absolute;
        left: 70px;
        top: 143px;
        width: 930px;
        font:
          800 83px/0.92 Syne,
          sans-serif;
        letter-spacing: -0.055em;
      }
      .title span {
        color: #e64ba8;
      }
      .profile {
        position: absolute;
        left: 72px;
        right: 72px;
        top: 410px;
        height: 550px;
        border: 3px solid #101416;
        background: #fff;
      }
      .field {
        height: 160px;
        display: grid;
        grid-template-columns: 115px 1fr 160px;
        align-items: center;
        padding: 0 33px;
        border-bottom: 2px solid #d8d9d3;
      }
      .field small {
        font:
          600 13px/1 IBM Plex Mono,
          monospace;
        letter-spacing: 0.1em;
        color: #667077;
      }
      .field strong {
        font:
          700 33px/1 Syne,
          sans-serif;
      }
      .state {
        text-align: center;
        padding: 13px 10px;
        font:
          600 11px/1 IBM Plex Mono,
          monospace;
        letter-spacing: 0.08em;
      }
      .captured .state {
        background: #38c878;
      }
      .waiting .state {
        background: #e2e4df;
        color: #667077;
      }
      .pulse {
        position: absolute;
        left: 45px;
        right: 45px;
        top: 115px;
        height: 6px;
        background: #38c878;
      }
      .pulse:after {
        content: "";
        position: absolute;
        right: 31%;
        top: -14px;
        width: 34px;
        height: 34px;
        background: #e64ba8;
        border: 8px solid #fff;
        border-radius: 50%;
      }
      .selection {
        position: absolute;
        left: 35px;
        right: 35px;
        top: 15px;
        height: 330px;
        border: 7px solid #e64ba8;
      }
      .progress {
        position: absolute;
        left: 72px;
        right: 72px;
        top: 1010px;
        height: 26px;
        border: 3px solid #101416;
        padding: 3px;
      }
      .progress div {
        width: 67%;
        height: 100%;
        background: linear-gradient(90deg, #38c878, #e64ba8);
      }
      .progress-label {
        position: absolute;
        left: 72px;
        right: 72px;
        top: 1052px;
        display: flex;
        justify-content: space-between;
        font:
          600 12px/1 IBM Plex Mono,
          monospace;
        letter-spacing: 0.09em;
      }
      .next {
        position: absolute;
        right: 73px;
        bottom: 157px;
        font:
          600 14px/1 IBM Plex Mono,
          monospace;
        letter-spacing: 0.1em;
        color: #e64ba8;
      }
      .foot {
        position: absolute;
        left: 73px;
        right: 73px;
        bottom: 61px;
        padding-top: 18px;
        border-top: 2px solid #101416;
        display: flex;
        justify-content: space-between;
        font:
          500 14px/1 IBM Plex Mono,
          monospace;
        letter-spacing: 0.11em;
      }
      .foot>span:nth-child(2){gap:9px!important;font-size:21px!important}.foot>span:nth-child(2) svg{width:38px!important;height:38px!important}
    </style>
  </head>
  <body>
    <main class="c">
      <div class="meta">
        <span>PROGRESSIVE PROFILING / LEAD</span><b>2 / 3 CAPTURED</b>
      </div>
      <h1 class="title">
        SATU PERTANYAAN.<br /><span>SATU DATA TERLENGKAPI.</span>
      </h1>
      <section class="profile">
        <div class="field captured">
          <small>01 / NAME</small><strong>Dimas</strong
          ><span class="state">CAPTURED</span>
        </div>
        <div class="field captured">
          <small>02 / COMPANY</small><strong>PT Ruang Tumbuh</strong
          ><span class="state">CAPTURED</span>
        </div>
        <div class="field waiting">
          <small>03 / EMAIL</small><strong>Menunggu jawaban</strong
          ><span class="state">MISSING</span>
        </div>
        <div class="pulse"></div>
        <div class="selection"></div>
      </section>
      <div class="progress"><div></div></div>
      <div class="progress-label">
        <span>PROFILE COMPLETION</span><span>67%</span>
      </div>
      <div class="next">NEXT / BACA INTENT →</div>
      <footer class="foot">
        <span>04 / 08</span><span style="display:flex;align-items:center;gap:7px;font:600 15px/1 Outfit,sans-serif;letter-spacing:0;color:#2855ff"><svg width="25" height="25" viewBox="0 0 1000 1000"><polygon fill="currentColor" points="492.61 542.75 346.66 542.75 318.1 695.74 301.39 695.74 271.57 660.3 328.84 342.73 375.84 302.78 558 302.78 588.41 339.71 584.15 363.7 361.89 363.7 434.48 472.28 881.98 472.28 809.39 363.7 730.42 363.7 742.84 293.6 644.45 174.96 312.4 174.96 193.96 276.34 118.02 705.47 216.38 825.04 550.2 825.04 665.99 727.28 674.5 679.26 506.15 679.26 484.45 695.74 464.17 695.74 472.43 651.34 865.85 651.34 793.26 542.75"/></svg>omniflow.</span><span>IDENTITAS FIKTIF</span>
      </footer>
    </main>
  </body>
</html>
