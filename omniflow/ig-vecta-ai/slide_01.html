      .grid {

      }
      .signal {
        position: absolute;
        left: -10px;
        right: -10px;
        top: 317px;
        height: 235px;

        gap: 7px;
        overflow: hidden;
      }
      .signal i {
        width: 10px;
        background: #38c878;

      .signal i:nth-child(4n) {
        height: 32px;
      }
      .signal i:nth-child(4n + 1) {

      }
      .signal i:nth-child(4n + 2) {

      }
      .signal i:nth-child(4n + 3) {

      .incoming {

        left: 74px;
        bottom: 171px;
        width: 715px;

        border-left: 7px solid #e64ba8;
        background: #1c2326;
        font-size: 25px;
        line-height: 1.3;
      }
      .incoming small {

        margin-bottom: 12px;

          500 14px/1 IBM Plex Mono,
